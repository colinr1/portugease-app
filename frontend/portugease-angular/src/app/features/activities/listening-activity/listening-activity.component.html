<section class="activity-form">
  <app-audio-player [src]="audioUrl"></app-audio-player>

  <label>
    What did you hear?
    <input
      type="text"
      [(ngModel)]="answerText"
      [disabled]="disabled"
      placeholder="Type what you heard"
    />
  </label>

  <button
    type="button"
    class="submit-button"
    [disabled]="disabled || !answerText.trim()"
    (click)="submit()"
  >
    Submit listening answer
  </button>
</section>

@if (loading) {
  <p>Loading city...</p>
}

@if (errorMessage) {
  <p>{{ errorMessage }}</p>
}

@if (city) {
  <section
    class="city-page"
    [style.background-image]="backgroundImageStyle"
  >
    <div class="city-card">
      <p class="eyebrow">City level</p>
      <h1>{{ city.name }}</h1>

      <app-city-location-menu [locations]="city.locations"></app-city-location-menu>
    </div>
  </section>
}

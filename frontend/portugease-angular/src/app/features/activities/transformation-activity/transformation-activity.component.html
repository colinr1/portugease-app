<section class="activity-form">
  <div class="instructions">
    <p *ngIf="prompt" class="prompt">
      {{ prompt }}
    </p>

    <p *ngIf="sourceSentence" class="source">
      {{ sourceSentence }}
    </p>
  </div>

  <label>
    Your answer
    <input
      type="text"
      [(ngModel)]="answerText"
      [disabled]="disabled"
      placeholder="Type your transformed sentence"
    />
  </label>

  <button
    type="button"
    class="submit-button"
    [disabled]="disabled || !answerText.trim()"
    (click)="submit()"
  >
    Submit transformation
  </button>
</section>

<section class="activity-form">
  @for (leftItem of leftItems; track $index) {
    <div class="match-row">
      <strong>{{ leftItem }}</strong>

      <select
        [(ngModel)]="answers[leftItem]"
        [disabled]="disabled"
        [attr.aria-label]="'Choose match for ' + leftItem"
      >
        <option value="">Choose match</option>
        @for (option of rightItems; track $index) {
          <option [value]="option">
            {{ option }}
          </option>
        }
      </select>
    </div>
  }

  <button
    type="button"
    class="submit-button"
    [disabled]="disabled || !allAnswered"
    (click)="submit()"
  >
    Submit matches
  </button>
</section>

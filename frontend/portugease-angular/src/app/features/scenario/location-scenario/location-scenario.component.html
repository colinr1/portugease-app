<section class="scenario-page">
  <header class="scenario-header">
    <div>
      <p class="eyebrow">Interactive location</p>
      <h1>{{ lesson.title }}</h1>
    </div>
  </header>

  <div class="scenario-stage">
    <app-image-scene
      [imagePath]="lesson.backgroundImage?.filePath || ''"
      [altText]="lesson.backgroundImage?.altText || lesson.title"
      [hotspots]="visibleSceneHotspots"
      [introFocusMarkers]="introFocusMarkers"
      (hotspotSelected)="onHotspotSelected($event)"
    ></app-image-scene>

    @if (!modalOpen) {
      <div class="beach-task-tray-layer">
        <app-beach-task-tray
          [activities]="lesson.activities"
          (openChange)="onTaskTrayOpenChange($event)"
          (activitySelected)="onActivityTaskSelected($event)"
        ></app-beach-task-tray>
      </div>
    }

    <div class="desktop-modal-layer">
      @if (selectedActivity && selectedHotspot) {
        <app-scenario-interaction-modal
          [activity]="selectedActivity"
          [locationName]="lesson.title"
          [hotspot]="selectedHotspot"
          (closed)="closeNormalModal()"
        ></app-scenario-interaction-modal>
      }

      @if (introDialogueOpen && lesson.introDialogue) {
        <app-intro-dialogue-modal
          [dialogue]="lesson.introDialogue"
          (lineChanged)="onIntroDialogueLineChanged($event)"
          (closed)="onIntroDialogueClosed()"
          (finished)="onIntroDialogueFinished()"
        ></app-intro-dialogue-modal>
      }
    </div>
  </div>

  <div class="mobile-modal-layer">
    @if (selectedActivity && selectedHotspot) {
      <app-scenario-interaction-modal
        class="below-image-modal"
        [activity]="selectedActivity"
        [locationName]="lesson.title"
        [hotspot]="selectedHotspot"
        (closed)="closeNormalModal()"
      ></app-scenario-interaction-modal>
    }

    @if (introDialogueOpen && lesson.introDialogue) {
      <app-intro-dialogue-modal
        class="below-image-modal"
        [dialogue]="lesson.introDialogue"
        (lineChanged)="onIntroDialogueLineChanged($event)"
        (closed)="onIntroDialogueClosed()"
        (finished)="onIntroDialogueFinished()"
      ></app-intro-dialogue-modal>
    }
  </div>
</section>

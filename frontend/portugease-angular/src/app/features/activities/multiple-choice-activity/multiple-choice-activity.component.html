<section class="activity-form">
  @if (question) {
    <h4>{{ question }}</h4>
  }

  <div class="options">
    @for (option of options; track option.id) {
      <label
        class="option"
        [class.selected]="selectedOptionId === option.id"
      >
        <input
          type="radio"
          name="multipleChoiceOption"
          [value]="option.id"
          [disabled]="disabled"
          (change)="selectedOptionId = option.id"
        />
        <span>{{ option.text }}</span>
      </label>
    }
  </div>

  <button
    type="button"
    class="submit-button"
    [disabled]="disabled || !selectedOptionId"
    (click)="submit()"
  >
    Submit answer
  </button>
</section>

<section class="activity-form">
  <div class="match-row" *ngFor="let pair of pairs">
    <strong>{{ pair.left }}</strong>

    <select
      [(ngModel)]="answers[pair.left]"
      [disabled]="disabled"
      [attr.aria-label]="'Choose match for ' + pair.left"
    >
      <option value="">Choose match</option>
      <option *ngFor="let option of rightOptions" [value]="option">
        {{ option }}
      </option>
    </select>
  </div>

  <button
    type="button"
    class="submit-button"
    [disabled]="disabled || !allAnswered"
    (click)="submit()"
  >
    Submit matches
  </button>
</section>

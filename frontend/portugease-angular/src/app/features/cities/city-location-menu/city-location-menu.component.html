<div class="location-grid">
  @for (location of locations; track location.id) {
    <a
      class="location-card"
      [class.locked]="location.status === 'LOCKED'"
      [routerLink]="location.status === 'LOCKED' ? null : ['/locations', location.slug]"
      [state]="{ citySlug: citySlug, cityName: cityName }"
      [attr.aria-disabled]="location.status === 'LOCKED'"
    >
      @if (location.backgroundImage?.filePath) {
        <img
          [src]="location.backgroundImage?.filePath"
          [alt]="location.backgroundImage?.altText || location.name"
        />
      }

      <div class="content">
        <h2>{{ location.name }}</h2>

        @if (location.status !== 'IN_PROGRESS') {
          <div class="meta">
            <strong
              [class.status-completed]="location.status === 'COMPLETED'"
              [class.status-locked]="location.status === 'LOCKED'"
              [class.status-unlocked]="location.status === 'UNLOCKED'"
            >
              {{ location.status }}
            </strong>
          </div>
        }
      </div>
    </a>
  }
</div>

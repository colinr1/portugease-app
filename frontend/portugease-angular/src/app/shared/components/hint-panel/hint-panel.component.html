<section class="hint-panel" *ngIf="visibleHints.length > 0" aria-live="polite">
  <div
    *ngFor="let hint of visibleHints"
    class="hint-item"
    [class.extra-hint]="hint.level >= 2"
  >
    <p class="hint-label">
      {{ hint.level >= 2 ? 'Extra hint' : 'Hint' }}
    </p>

    <p class="hint-text">
      {{ hint.text }}
    </p>
  </div>
</section>

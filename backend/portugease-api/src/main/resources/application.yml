spring:
  application:
    name: portugease-api

  datasource:
    url: jdbc:postgresql://localhost:5432/portugease
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
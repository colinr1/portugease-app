<div class="beach-task-tray" [class.open]="open">
  <button
    type="button"
    class="tray-toggle"
    [attr.aria-expanded]="open"
    aria-controls="beach-task-panel"
    (click)="toggleOpen()"
  >
    <span class="toggle-title">Beach Tasks</span>
    <span class="toggle-count">{{ taskCount }}</span>
    <span class="toggle-chevron" aria-hidden="true">{{ open ? '⌄' : '⌃' }}</span>
  </button>

  @if (open) {
    <section
      id="beach-task-panel"
      class="task-panel"
      aria-label="Beach tasks"
    >
<!--    <header class="task-panel-header">-->
<!--      <div>-->
<!--        <h2>Beach Tasks</h2>-->
<!--      </div>-->

<!--      <button-->
<!--        type="button"-->
<!--        class="tray-close"-->
<!--        aria-label="Close beach tasks"-->
<!--        (click)="closeTray()"-->
<!--      >-->
<!--        ×-->
<!--      </button>-->
<!--    </header>-->

      <div class="task-list">
        @for (activity of sortedActivities; track activity.id) {
          <button
            type="button"
            class="task-card"
            [ngClass]="activityTypeClass(activity)"
            (click)="selectActivity(activity)"
          >
            <span class="task-type">{{ activityTypeLabel(activity) }}</span>
          </button>
        }
      </div>
    </section>
  }
</div>

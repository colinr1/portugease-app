<section class="activity-form">
  <div class="instructions">
    @if (prompt) {
      <p class="prompt">
        {{ prompt }}
      </p>
    }

    @if (sourceSentence) {
      <p class="source">
        {{ sourceSentence }}
      </p>
    }
  </div>

  <label>
    Your answer
    <input
      type="text"
      [(ngModel)]="answerText"
      [disabled]="disabled"
      placeholder="Write the new sentence in Portuguese"
    />
  </label>

  <button
    type="button"
    class="submit-button"
    [disabled]="disabled || !answerText.trim()"
    (click)="submit()"
  >
    Submit transformation
  </button>
</section>

<div class="scene-shell">
  <div class="image-scene" [class.loaded]="imageLoaded">
    @if (imagePath) {
      <img
        class="scene-image"
        [src]="imagePath"
        [alt]="altText"
        draggable="false"
        (load)="onImageLoad()"
        (error)="onImageError()"
      />
    }

    @if (!imagePath || imageFailed) {
      <div class="image-error">
        <p>Scene image could not be loaded.</p>
      </div>
    }

    @if (imageLoaded && introFocusMarkers.length) {
      <div
        class="intro-focus-overlay"
        aria-hidden="true"
      >
        @for (marker of introFocusMarkers; track $index) {
          <span
            class="intro-focus-marker"
            [style.left.%]="marker.xPercent"
            [style.top.%]="marker.yPercent"
            [attr.title]="marker.ariaLabel || 'Dialogue focus marker'"
          ></span>
        }
      </div>
    }

    @if (imageLoaded) {
      <app-hotspot-overlay
        [hotspots]="hotspots"
        (hotspotSelected)="onHotspotSelected($event)"
      />
    }
  </div>
</div>

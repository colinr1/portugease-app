<section class="activity-form">
  @if (hasPlayableAudio) {
    <button
      type="button"
      class="audio-button"
      (click)="playAudio()"
    >
      Play audio
    </button>
  } @else {
    <p class="audio-unavailable" role="status">
      Audio is unavailable for this activity.
    </p>
  }

  <label>
    What did you hear?
    <input
      type="text"
      [(ngModel)]="answerText"
      [disabled]="disabled"
      placeholder="Type what you heard"
    />
  </label>

  <button
    type="button"
    class="submit-button"
    [disabled]="disabled || !answerText.trim()"
    (click)="submit()"
  >
    Submit listening answer
  </button>
</section>

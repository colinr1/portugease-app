<section class="activity-form">
  @for (pair of pairs; track $index) {
    <div class="match-row">
      <strong>{{ pair.left }}</strong>

      <select
        [(ngModel)]="answers[pair.left]"
        [disabled]="disabled"
        [attr.aria-label]="'Choose match for ' + pair.left"
      >
        <option value="">Choose match</option>
        @for (option of rightOptions; track $index) {
          <option [value]="option">
            {{ option }}
          </option>
        }
      </select>
    </div>
  }

  <button
    type="button"
    class="submit-button"
    [disabled]="disabled || !allAnswered"
    (click)="submit()"
  >
    Submit matches
  </button>
</section>

@if (markers.length > 0) {
  <div
    class="intro-focus-overlay"
    aria-hidden="true"
  >
    @for (marker of markers; track $index) {
      <span
        class="intro-focus-marker"
        [style.left.%]="marker.xPercent"
        [style.top.%]="marker.yPercent"
        [attr.title]="markerLabel(marker)"
      ></span>
    }
  </div>
}
